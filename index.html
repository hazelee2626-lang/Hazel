<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>체크리스트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f0f0f;--card:#1a1a1a;--border:#2a2a2a;--border2:#333;
  --green:#28c840;--red:#ff5f57;--yellow:#febc2e;
  --text:#fff;--dim:#888;--dimmer:#555;--muted:#444;--input:#252525;
}
body{font-family:'SF Mono','Monaco','Menlo','Consolas',monospace;background:var(--bg);min-height:100vh;color:var(--text);}

/* ── 유저바 ── */
.user-bar{background:var(--card);padding:10px 16px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border);}
.user-name{font-size:12px;color:#bbb;flex:1;}
.user-date{font-size:11px;color:var(--dimmer);}

/* ── 탭 ── */
.tab-bar{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.tab-btn{flex:1;padding:10px 4px 9px;background:none;border:none;font-family:inherit;font-size:11px;color:var(--dimmer);cursor:pointer;letter-spacing:.06em;border-bottom:2px solid transparent;transition:all .15s;}
.tab-btn.on{color:var(--green);border-bottom-color:var(--green);}

/* ── 탭 컨텐츠 ── */
.tab-content{display:none;padding:18px 16px 130px;}
.tab-content.on{display:block;}

/* ── 터미널 공통 ── */
.terminal{background:var(--card);border-radius:11px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.18);}
.tbar{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:8px;}
.tl-wrap{display:flex;gap:5px;}
.tl{width:11px;height:11px;border-radius:50%;}
.tl-r{background:var(--red);}.tl-y{background:var(--yellow);}.tl-g{background:var(--green);}
.tbar-lbl{font-size:11px;color:var(--dim);letter-spacing:.12em;}

/* ── 진행 리포트 ── */
.pr-body{padding:13px 16px;font-size:12px;color:#ccc;line-height:2;}
.pr-row{display:flex;align-items:center;gap:6px;}
.pr-k{color:var(--dim);min-width:110px;}.pr-v{color:var(--text);}.pr-v.g{color:var(--green);font-weight:700;}
.pr-bar-row{display:flex;align-items:center;gap:8px;margin:4px 0;}
.pr-bar{flex:1;height:13px;background:#2a2a2a;border-radius:2px;overflow:hidden;border:1px solid #3a3a3a;}
.pr-bar-fill{height:100%;background:var(--green);transition:width .4s;background-image:repeating-linear-gradient(90deg,transparent,transparent 6px,rgba(0,0,0,.15) 6px,rgba(0,0,0,.15) 7px);}
.pr-pct{color:var(--green);font-weight:700;min-width:38px;text-align:right;}
.pr-g-row{display:flex;align-items:center;gap:6px;padding:1px 0;}
.pr-g-dot{color:var(--dimmer);}.pr-g-name{color:#bbb;min-width:56px;}
.pr-g-bar{flex:1;height:9px;background:#2a2a2a;border-radius:2px;overflow:hidden;border:1px solid #333;}
.pr-g-fill{height:100%;background:var(--green);transition:width .4s;background-image:repeating-linear-gradient(90deg,transparent,transparent 4px,rgba(0,0,0,.15) 4px,rgba(0,0,0,.15) 5px);}
.pr-g-stat{color:var(--dim);font-size:11px;min-width:72px;text-align:right;}
.pr-prompt{color:var(--muted);margin-top:4px;}

/* ── 알 영역 (진행률 카드 내) ── */
.pr-egg-row{display:flex;align-items:center;gap:14px;padding:12px 16px 12px;border-top:1px solid #222;margin-top:4px;}
.pr-egg-canvas-wrap{flex-shrink:0;background:#060e06;border:2px solid #1a2a1a;border-radius:6px;padding:5px;box-shadow:inset 0 0 6px rgba(0,0,0,.9),0 0 0 1px #0a180a;}
.pr-egg-canvas{image-rendering:pixelated;image-rendering:crisp-edges;width:85px;height:80px;display:block;}
.pr-egg-info{flex:1;}
.pr-egg-stage{font-size:10px;color:#1db833;letter-spacing:.1em;margin-bottom:5px;font-family:'SF Mono',monospace;}
.pr-egg-msg{font-size:11px;color:#555;line-height:1.7;white-space:pre-line;}

/* ── 플로팅 알 ── */
.float-egg{position:fixed;bottom:100px;right:14px;z-index:500;cursor:pointer;transition:transform .2s;}
.float-egg:hover{transform:scale(1.12);}
.float-egg:active{transform:scale(.92);}
.float-egg-wrap{background:#060e06;border:2px solid #1a2a1a;border-radius:7px;padding:5px;box-shadow:inset 0 0 8px rgba(0,0,0,.9),0 2px 12px rgba(0,0,0,.6),0 0 0 1px #0d1a0d;}
.float-egg-canvas{image-rendering:pixelated;image-rendering:crisp-edges;width:51px;height:48px;display:block;}

/* ── 탄생 팝업 ── */
.hatch-overlay{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.85);flex-direction:column;align-items:center;justify-content:center;}
.hatch-overlay.show{display:flex;}
.hatch-card{background:#111;border:1px solid #222;border-radius:14px;padding:28px 24px 22px;text-align:center;max-width:300px;width:90%;box-shadow:0 16px 60px rgba(0,0,0,.7);}
.hatch-lcd{background:#060e06;border:2px solid #1a2a1a;border-radius:8px;padding:10px;margin:0 auto 18px;display:inline-block;box-shadow:inset 0 0 12px rgba(0,0,0,.9);}
.hatch-canvas{image-rendering:pixelated;image-rendering:crisp-edges;width:102px;height:96px;display:block;}
.hatch-title{font-size:13px;color:#1db833;font-family:'SF Mono',monospace;letter-spacing:.1em;margin-bottom:8px;}
.hatch-sub{font-size:11px;color:#666;margin-bottom:20px;line-height:1.7;white-space:pre-line;}
.hatch-close{width:100%;padding:12px;background:#1db833;border:none;border-radius:7px;font-family:inherit;font-size:13px;font-weight:700;color:#000;cursor:pointer;}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:1999;}

/* ── CLI 바 ── */
.cli-bar{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--dimmer);padding:8px 2px;}
.cli-cmd{color:var(--green);}
.cli-new-btn{background:none;border:1px solid #555;color:var(--dim);font-family:inherit;font-size:11px;padding:5px 10px;border-radius:4px;cursor:pointer;transition:all .15s;}
.cli-new-btn:hover{color:var(--green);border-color:var(--green);}
.new-group-form{background:var(--card);border-radius:10px;padding:14px 16px;margin-bottom:14px;display:none;flex-direction:column;gap:8px;}
.new-group-form.show{display:flex;}
.ng-input{background:var(--input);border:1px solid var(--border2);color:var(--text);font-family:inherit;font-size:13px;padding:9px 12px;border-radius:5px;outline:none;transition:border-color .15s;}
.ng-input:focus{border-color:var(--green);}
.ng-input::placeholder{color:var(--dimmer);}
.ng-btns{display:flex;gap:8px;}
.ng-ok{background:var(--green);border:none;color:#000;font-family:inherit;font-size:12px;font-weight:700;padding:8px 16px;border-radius:4px;cursor:pointer;}
.ng-cancel{background:var(--input);border:1px solid var(--border2);color:var(--dim);font-family:inherit;font-size:12px;padding:8px 16px;border-radius:4px;cursor:pointer;}

/* ── 섹션 ── */
.sec-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px 10px;border-bottom:1px solid var(--border);}
.sec-path{font-size:13px;color:#aaa;letter-spacing:.04em;}
.sec-right{display:flex;align-items:center;gap:8px;}
.sec-count{font-size:12px;color:var(--dim);}
.sec-add-btn{background:none;border:none;color:var(--dim);font-family:inherit;font-size:17px;cursor:pointer;transition:color .15s;}
.sec-add-btn:hover{color:var(--green);}
.sec-del-btn{background:none;border:none;color:#3a3a3a;font-family:inherit;font-size:12px;cursor:pointer;transition:color .15s;}
.sec-del-btn:hover{color:var(--red);}
.sec-grass-badge{font-size:10px;color:var(--green);border:1px solid rgba(40,200,64,.4);padding:2px 7px;border-radius:10px;cursor:pointer;transition:background .15s;}
.sec-grass-badge:hover{background:rgba(40,200,64,.1);}

/* ── 할일 ── */
.task-item{display:flex;align-items:flex-start;padding:11px 16px;border-bottom:1px solid #222;gap:8px;transition:background .1s;}
.task-item:last-of-type{border-bottom:none;}
.task-item:hover{background:#1e1e1e;}
.task-item:hover .task-actions{opacity:1;}
.task-cb{font-size:13px;min-width:26px;cursor:pointer;padding-top:1px;flex-shrink:0;user-select:none;transition:color .15s;}
.task-cb.done{color:var(--green);}.task-cb.todo{color:#555;}
.task-body{flex:1;min-width:0;cursor:pointer;}
.task-name{font-size:13px;color:var(--text);line-height:1.4;word-break:break-all;}
.task-name.done{text-decoration:line-through;color:#4a4a4a;}
.task-ts{font-size:11px;color:#4a4a4a;margin-top:3px;}
.task-actions{display:flex;gap:5px;flex-shrink:0;opacity:0;transition:opacity .15s;padding-top:1px;}
.t-focus-btn{background:none;border:1px solid var(--green);color:var(--green);font-family:inherit;font-size:10px;padding:3px 7px;border-radius:3px;cursor:pointer;opacity:.75;transition:all .15s;}
.t-focus-btn:hover{opacity:1;background:rgba(40,200,64,.1);}
.t-del-btn{background:none;border:1px solid #3a3a3a;color:#555;font-family:inherit;font-size:10px;padding:3px 7px;border-radius:3px;cursor:pointer;transition:all .15s;}
.t-del-btn:hover{color:var(--red);border-color:var(--red);}
.add-form{padding:10px 16px;border-top:1px solid var(--border);display:none;gap:8px;}
.add-form.show{display:flex;}
.add-input{flex:1;background:var(--input);border:1px solid var(--border2);color:var(--text);font-family:inherit;font-size:13px;padding:8px 10px;border-radius:4px;outline:none;transition:border-color .15s;}
.add-input:focus{border-color:var(--green);}
.add-input::placeholder{color:var(--dimmer);}
.add-ok{background:var(--green);border:none;color:#000;font-family:inherit;font-size:13px;font-weight:700;padding:8px 14px;border-radius:4px;cursor:pointer;}
.empty-state{padding:18px 16px;text-align:center;font-size:12px;color:#3a3a3a;}

/* ── 잔디뷰 ── */
.grass-section-select{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.grass-sec-btn{font-family:inherit;font-size:11px;padding:6px 14px;border-radius:20px;cursor:pointer;background:#1a1a1a;border:1px solid #333;color:var(--dim);transition:all .15s;}
.grass-sec-btn.on{background:rgba(40,200,64,.15);border-color:var(--green);color:var(--green);}
.grass-wrap{background:var(--card);border-radius:11px;padding:18px;margin-bottom:14px;overflow:hidden;}
.grass-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.grass-title{font-size:13px;color:#bbb;letter-spacing:.04em;}
.grass-year{font-size:11px;color:var(--dimmer);}
.grass-scroll{overflow-x:auto;padding-bottom:8px;}
.grass-month-row{display:flex;gap:3px;margin-bottom:4px;padding-left:0;}
.grass-month-lbl{font-size:10px;color:var(--dimmer);text-align:left;}
.grass-grid{display:flex;gap:3px;}
.grass-col{display:flex;flex-direction:column;gap:3px;}
.grass-cell{width:13px;height:13px;border-radius:2px;background:#222;border:1px solid #2a2a2a;flex-shrink:0;}
.grass-cell.l1{background:#0a4a14;border-color:#0a4a14;}
.grass-cell.l2{background:#0e7321;border-color:#0e7321;}
.grass-cell.l3{background:#18a832;border-color:#18a832;}
.grass-cell.l4{background:var(--green);border-color:var(--green);}
.grass-cell.today{outline:2px solid var(--yellow);outline-offset:1px;}
.grass-legend{display:flex;align-items:center;gap:5px;margin-top:12px;justify-content:flex-end;}
.grass-legend-lbl{font-size:10px;color:var(--dimmer);}
.grass-legend-cells{display:flex;gap:2px;}
.grass-legend-cell{width:11px;height:11px;border-radius:2px;}
.grass-stats{display:flex;gap:10px;margin-top:14px;}
.grass-stat{flex:1;background:#111;border-radius:7px;padding:10px 8px;text-align:center;}
.grass-stat-val{font-size:20px;color:var(--green);font-weight:700;}
.grass-stat-lbl{font-size:10px;color:var(--dimmer);margin-top:2px;letter-spacing:.05em;}
.grass-empty{font-size:12px;color:#3a3a3a;padding:24px 16px;text-align:center;}

/* ── 히스토리 ── */
.hist-header-row{margin-bottom:14px;}
.hist-title{font-size:14px;color:#ccc;font-weight:700;margin-bottom:3px;}
.hist-sub{font-size:11px;color:var(--dimmer);}
.hist-day{background:var(--card);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.hist-day-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;border-bottom:1px solid transparent;transition:border-color .15s;}
.hist-day-hdr.open{border-bottom-color:var(--border);}
.hist-day-date{font-size:13px;color:#bbb;letter-spacing:.04em;}
.hist-day-badge{font-size:11px;color:var(--green);}
.hist-day-body{padding:10px 16px 14px;display:none;}
.hist-day-body.open{display:block;}
.hist-grp-name{font-size:11px;color:var(--dimmer);margin:8px 0 4px;letter-spacing:.08em;}
.hist-task{font-size:12px;color:#666;padding:2px 0;}
.hist-task.done{color:#bbb;}
.hist-task.done::before{content:"[✓] ";color:var(--green);}
.hist-task:not(.done)::before{content:"[ ] ";color:#444;}
.hist-empty{font-size:12px;color:#3a3a3a;padding:24px;text-align:center;}

/* ── 설정 ── */
.setting-block{background:var(--card);border-radius:11px;padding:16px;margin-bottom:12px;}
.setting-section-title{font-size:11px;color:var(--dim);letter-spacing:.1em;margin-bottom:12px;}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #222;}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:13px;color:#bbb;}
.toggle-wrap{position:relative;width:36px;height:20px;}
.toggle-wrap input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:#333;border-radius:10px;cursor:pointer;transition:.2s;}
.toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#666;border-radius:50%;transition:.2s;}
.toggle-wrap input:checked+.toggle-slider{background:rgba(40,200,64,.35);}
.toggle-wrap input:checked+.toggle-slider::before{transform:translateX(16px);background:var(--green);}

/* ── 하단 버튼 ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;display:flex;gap:12px;padding:14px 16px 30px;background:linear-gradient(transparent,#0f0f0f 28%);}
.btn-cert{flex:1;padding:14px;background:#2a2a2a;border:1px solid #3a3a3a;border-radius:11px;font-family:inherit;font-size:13px;color:#ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .15s;}
.btn-cert:hover{background:#333;}
.btn-list{flex:1;padding:14px;background:var(--card);border:none;border-radius:11px;font-family:inherit;font-size:13px;color:#ccc;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-list:hover{background:#222;}

/* ── 초집중 ── */
.focus-overlay{display:none;position:fixed;inset:0;background:#0a0a0a;z-index:1000;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.focus-overlay.show{display:flex;}
.focus-card{width:100%;max-width:380px;background:var(--card);border-radius:13px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5);}
.focus-tbar{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:8px;}
.focus-tbar-title{font-size:11px;color:var(--dim);letter-spacing:.12em;}
.focus-close-btn{margin-left:auto;background:none;border:none;color:#555;font-family:inherit;font-size:15px;cursor:pointer;transition:color .15s;}
.focus-close-btn:hover{color:var(--red);}
.focus-body{padding:28px 22px 24px;text-align:center;}
.focus-cmd{font-size:11px;color:var(--dimmer);letter-spacing:.12em;margin-bottom:10px;}
.focus-task{font-size:17px;color:var(--text);line-height:1.4;margin-bottom:28px;font-weight:600;}
.focus-timer{font-size:54px;color:var(--green);letter-spacing:.04em;margin-bottom:6px;font-weight:300;}
.focus-state{font-size:11px;color:var(--dimmer);margin-bottom:20px;letter-spacing:.12em;}
.focus-controls{display:flex;gap:10px;justify-content:center;margin-bottom:18px;}
.f-btn{font-family:inherit;font-size:13px;padding:10px 22px;border-radius:6px;cursor:pointer;border:none;transition:all .15s;}
.f-btn-start{background:var(--green);color:#000;font-weight:700;}
.f-btn-start:hover{background:#22b035;}
.f-btn-reset{background:#252525;color:var(--dim);border:1px solid var(--border2);}
.f-btn-reset:hover{color:var(--text);}
.focus-presets{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.f-preset{font-family:inherit;font-size:11px;padding:5px 12px;border-radius:4px;cursor:pointer;background:#222;border:1px solid var(--border2);color:#666;transition:all .15s;}
.f-preset:hover{color:var(--green);border-color:var(--green);}
.f-preset.on{background:rgba(40,200,64,.1);color:var(--green);border-color:var(--green);}
.focus-done{width:100%;padding:13px;background:var(--green);border:none;border-radius:7px;font-family:inherit;font-size:14px;font-weight:700;color:#000;cursor:pointer;transition:background .15s;}
.focus-done:hover{background:#22b035;}

/* ── 모달 ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:900;align-items:flex-end;}
.modal-bg.show{display:flex;}
.modal-sheet{width:100%;background:var(--card);border-radius:16px 16px 0 0;padding:18px 18px 36px;max-height:80vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:#444;border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:15px;color:var(--text);margin-bottom:14px;font-weight:700;}
.modal-code{background:#111;border-radius:8px;padding:14px;font-family:inherit;font-size:12px;color:#bbb;line-height:1.9;white-space:pre-wrap;word-break:break-all;margin-bottom:14px;min-height:80px;border:1px solid #222;}
.modal-copy{width:100%;padding:13px;background:var(--green);border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;color:#000;cursor:pointer;margin-bottom:8px;transition:background .15s;}
.modal-copy:hover{background:#22b035;}
.modal-btns{display:flex;gap:8px;}
.modal-sec-btn{flex:1;padding:11px;background:#222;border:1px solid var(--border2);border-radius:7px;font-family:inherit;font-size:12px;color:var(--dim);cursor:pointer;transition:color .15s;}
.modal-sec-btn:hover{color:var(--text);}

/* ── 토스트 ── */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--green);color:#000;font-family:inherit;font-size:12px;font-weight:700;padding:9px 18px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;z-index:2000;letter-spacing:.05em;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- 유저바 -->
<div class="user-bar">
  <span class="user-name">☰ 체크리스트</span>
  <span class="user-date" id="userDateBar"></span>
</div>

<!-- 탭 -->
<div class="tab-bar">
  <button class="tab-btn on"  onclick="showTab('main',this)">할일</button>
  <button class="tab-btn"     onclick="showTab('grass',this)">🌿 잔디</button>
  <button class="tab-btn"     onclick="showTab('history',this)">📅 히스토리</button>
  <button class="tab-btn"     onclick="showTab('settings',this)">⚙ 설정</button>
</div>

<!-- ① 할일 탭 -->
<div class="tab-content on" id="tab-main">
  <div class="terminal">
    <div class="tbar">
      <div class="tl-wrap"><div class="tl tl-r"></div><div class="tl tl-y"></div><div class="tl tl-g"></div></div>
      <span class="tbar-lbl">PROGRESS_REPORT.EXE</span>
    </div>
    <div class="pr-body" id="prBody"></div>
  </div>
  <!-- 플로팅 알 -->
  <div class="float-egg" onclick="openHatchDetail()" title="알을 클릭!">
    <div class="float-egg-wrap">
      <canvas class="float-egg-canvas" id="floatEggCanvas" width="17" height="16"></canvas>
    </div>
  </div>

  <!-- 탄생 오버레이 -->
  <div class="hatch-overlay" id="hatchOverlay">
    <div class="confetti-wrap" id="confettiWrap"></div>
    <div class="hatch-card">
      <div class="hatch-lcd">
        <canvas class="hatch-canvas" id="hatchCanvas" width="17" height="16"></canvas>
      </div>
      <div class="hatch-title" id="hatchTitle"></div>
      <div class="hatch-sub" id="hatchSub"></div>
      <button class="hatch-close" onclick="closeHatch()">계속하기</button>
    </div>
  </div>

  <div class="cli-bar">

    </div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════
const pad = n => String(n).padStart(2,'0');
function getMMDD(d){ d=d||new Date(); return pad(d.getMonth()+1)+pad(d.getDate()); }
function getYYYYMMDD(d){ d=d||new Date(); return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`; }
function getDateFull(d){ d=d||new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function getTS(){ const d=new Date(); return `${getDateFull(d)} ${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function fmtKey(k){ return `${k.slice(0,4)}-${k.slice(4,6)}-${k.slice(6,8)}`; }

// ══════════════════════════════════════════
// 스토리지 키
// ══════════════════════════════════════════
const TODAY_KEY   = 'hazel_today_v3';
const HISTORY_KEY = 'hazel_history_v3';
const GRASS_KEY   = 'hazel_grass_v3';

// ══════════════════════════════════════════
// 오늘 데이터
// ══════════════════════════════════════════
function defaultData(){
  return {
    date: getMMDD(),
    groups:[
      {id:'g1', name:'1%',    tasks:[], grassEnabled:true},
      {id:'g2', name:'루틴',  tasks:[], grassEnabled:true},
      {id:'g3', name:'자기전',tasks:[], grassEnabled:false}
    ]
  };
}
function loadData(){
  try{ const r=localStorage.getItem(TODAY_KEY); if(r) return JSON.parse(r); }catch(e){}
  return defaultData();
}
function saveData(){ localStorage.setItem(TODAY_KEY, JSON.stringify(D)); }

let D = loadData();

// 날짜가 바뀌었으면 → 어제 스냅샷 저장 후 미완료만 이월
if(D.date !== getMMDD()){
  snapshotToday(false, D); // 어제 데이터 저장
  D.groups.forEach(g=>{ g.tasks=g.tasks.filter(t=>!t.done); });
  D.date = getMMDD();
  saveData();
}

// ══════════════════════════════════════════
// 히스토리 (날짜별 스냅샷)
// ══════════════════════════════════════════
function loadHistory(){ try{ const r=localStorage.getItem(HISTORY_KEY); if(r) return JSON.parse(r); }catch(e){} return {}; }
function saveHistory(h){ localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }

function snapshotToday(manual=false, data){
  const src = data || D;
  const key = data ? (() => {
    // 날짜가 바뀔 때 어제 날짜 키 계산
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    return getYYYYMMDD(yesterday);
  })() : getYYYYMMDD();

  const h = loadHistory();
  h[key] = {
    groups: JSON.parse(JSON.stringify(src.groups)),
    savedAt: getTS()
  };
  // 히스토리 최대 365일 유지
  const keys = Object.keys(h).sort();
  while(keys.length > 365){ delete h[keys.shift()]; }
  saveHistory(h);
  // 잔디 데이터도 갱신
  saveGrass(src, key);
  if(manual) toast('✓ 오늘 히스토리 저장!');
}

function clearHistory(){
  if(!confirm('히스토리를 전부 삭제할까요?')) return;
  localStorage.removeItem(HISTORY_KEY);
  localStorage.removeItem(GRASS_KEY);
  toast('삭제 완료');
}

// ══════════════════════════════════════════
// 잔디 데이터
// ══════════════════════════════════════════
function loadGrassStore(){ try{ const r=localStorage.getItem(GRASS_KEY); if(r) return JSON.parse(r); }catch(e){} return {}; }
function saveGrassStore(g){ localStorage.setItem(GRASS_KEY, JSON.stringify(g)); }

// grassStore 구조: { YYYYMMDD: { gid: {name,total,done,pct}, ... }, ... }
function saveGrass(src, dateKey){
  const store = loadGrassStore();
  const map = {};
  src.groups.forEach(g=>{
    if(!g.grassEnabled) return;
    const total=g.tasks.length, done=g.tasks.filter(t=>t.done).length;
    map[g.id] = { name:g.name, total, done, pct: total>0?Math.round(done/total*100):0 };
  });
  store[dateKey] = map;
  saveGrassStore(store);
}

// 체크할 때마다 오늘 잔디도 실시간 반영
function updateTodayGrass(){
  saveGrass(D, getYYYYMMDD());
}

// ══════════════════════════════════════════
// 렌더
// ══════════════════════════════════════════
function render(){
  saveData();
  updateTodayGrass();
  renderProgress();
  renderSections();
  renderGrassSettings();
}

function renderProgress(){
  const all=D.groups.flatMap(g=>g.tasks);
  const total=all.length, done=all.filter(t=>t.done).length, rem=total-done;
  const pct=total>0?Math.round(done/total*100):0;
  const gRows=D.groups.map(g=>{
    const gt=g.tasks.length, gd=g.tasks.filter(t=>t.done).length;
    const gp=gt>0?Math.round(gd/gt*100):0;
    return `<div class="pr-g-row">
      <span class="pr-g-dot">·</span><span class="pr-g-name">${g.name}</span>
      <div class="pr-g-bar"><div class="pr-g-fill" style="width:${gp}%"></div></div>
      <span class="pr-g-stat">${gp}% (${gd}/${gt})</span></div>`;
  }).join('');
  document.getElementById('prBody').innerHTML=`
    <div class="pr-row"><span class="pr-k">$ run</span><span class="pr-v">--timestamp=${getTS()}</span></div><br>
    <div class="pr-row"><span class="pr-k">TOTAL_TASKS</span><span class="pr-v">: ${total}</span></div>
    <div class="pr-row"><span class="pr-k">COMPLETED</span><span class="pr-v g">: ${done}</span></div>
    <div class="pr-row"><span class="pr-k">REMAINING</span><span class="pr-v">: ${rem}</span></div><br>
    <div class="pr-bar-row"><span class="pr-k">PROGRESS</span>
      <div class="pr-bar"><div class="pr-bar-fill" style="width:${pct}%"></div></div>
      <span class="pr-pct">${pct}%</span></div><br>
    <div><div class="pr-row"><span style="color:var(--dimmer)">> group_breakdown:</span></div>${gRows}</div>
    <div class="pr-prompt">> </div>
    <div class="pr-egg-row">
      <div class="pr-egg-canvas-wrap">
        <canvas class="pr-egg-canvas" id="prEggCanvas" width="20" height="24"></canvas>
      </div>
      <div class="pr-egg-info">
        <div class="pr-egg-stage" id="prEggStage"></div>
        <div class="pr-egg-msg" id="prEggMsg"></div>
      </div>
    </div>`;
  // 알 그리기는 DOM 생성 후
  requestAnimationFrame(()=>updateEgg(pct));
}

function renderSections(){
  const cont=document.getElementById('sections');
  cont.innerHTML='';
  D.groups.forEach(g=>{
    const done=g.tasks.filter(t=>t.done).length, total=g.tasks.length;
    const el=document.createElement('div'); el.className='terminal';
    const grassBadge=g.grassEnabled
      ? `<span class="sec-grass-badge" onclick="goGrass('${g.id}')">🌿잔디</span>` : '';
    const hdr=document.createElement('div'); hdr.className='sec-header';
    hdr.innerHTML=`<span class="sec-path">~/${g.name}/</span>
      <div class="sec-right">
        ${grassBadge}
        <span class="sec-count">${done}/${total}</span>
        <button class="sec-add-btn" onclick="toggleAdd('${g.id}')">+</button>
        <button class="sec-del-btn" onclick="deleteGroup('${g.id}')">×</button>
      </div>`;
    el.appendChild(hdr);
    if(total===0){
      const emp=document.createElement('div'); emp.className='empty-state';
      emp.textContent='> 할일을 추가하세요 (+)'; el.appendChild(emp);
    }
    [...g.tasks.filter(t=>!t.done), ...g.tasks.filter(t=>t.done)].forEach(task=>{
      const row=document.createElement('div'); row.className='task-item';
      row.innerHTML=`
        <span class="task-cb ${task.done?'done':'todo'}" onclick="toggleTask('${g.id}','${task.id}')">
          ${task.done?'[✓]':'[ ]'}</span>
        <div class="task-body" onclick="toggleTask('${g.id}','${task.id}')">
          <div class="task-name ${task.done?'done':''}">${task.name}</div>
          ${task.done?`<div class="task-ts"># done · ${task.doneAt}</div>`:''}
        </div>
        <div class="task-actions">
          ${!task.done?`<button class="t-focus-btn"
            onclick="openFocus('${g.id}','${task.id}');event.stopPropagation()">▶ 집중</button>`:''}
          <button class="t-del-btn"
            onclick="deleteTask('${g.id}','${task.id}');event.stopPropagation()">✕</button>
        </div>`;
      el.appendChild(row);
    });
    const form=document.createElement('div'); form.className='add-form'; form.id=`af_${g.id}`;
    form.innerHTML=`<input class="add-input" id="ai_${g.id}" placeholder="$ echo 'new task'"
      onkeydown="if(event.key==='Enter')addTask('${g.id}')">
      <button class="add-ok" onclick="addTask('${g.id}')">+</button>`;
    el.appendChild(form);
    cont.appendChild(el);
  });
}

function renderGrassSettings(){
  document.getElementById('grassSettingRows').innerHTML =
    D.groups.map(g=>`
      <div class="setting-row">
        <span class="setting-label">~/${g.name}/</span>
        <label class="toggle-wrap">
          <input type="checkbox" ${g.grassEnabled?'checked':''} onchange="toggleGrassEnabled('${g.id}',this.checked)">
          <span class="toggle-slider"></span>
        </label>
      </div>`).join('');
}

// ══════════════════════════════════════════
// 할일 CRUD
// ══════════════════════════════════════════
function toggleTask(gid,tid){
  const t=D.groups.find(g=>g.id===gid).tasks.find(t=>t.id===tid);
  t.done=!t.done; t.doneAt=t.done?getTS():null;
  render();
}
function deleteTask(gid,tid){
  const g=D.groups.find(g=>g.id===gid);
  g.tasks=g.tasks.filter(t=>t.id!==tid); render();
}
function addTask(gid){
  const inp=document.getElementById(`ai_${gid}`);
  const name=inp.value.trim(); if(!name) return;
  D.groups.find(g=>g.id===gid).tasks.push({id:'t'+Date.now(),name,done:false,doneAt:null});
  inp.value=''; render();
  document.getElementById(`af_${gid}`).classList.add('show');
  setTimeout(()=>document.getElementById(`ai_${gid}`)?.focus(),0);
}
function toggleAdd(gid){
  const f=document.getElementById(`af_${gid}`);
  f.classList.toggle('show');
  if(f.classList.contains('show')) setTimeout(()=>document.getElementById(`ai_${gid}`)?.focus(),0);
}

// ══════════════════════════════════════════
// 그룹
// ══════════════════════════════════════════
function toggleNewGroupForm(){
  const f=document.getElementById('newGroupForm'); f.classList.toggle('show');
  if(f.classList.contains('show')) setTimeout(()=>document.getElementById('ngInput').focus(),0);
}
function addGroup(){
  const inp=document.getElementById('ngInput');
  const name=inp.value.trim().replace(/^~\/|\/$/g,''); if(!name) return;
  D.groups.push({id:'g'+Date.now(),name,tasks:[],grassEnabled:false});
  inp.value=''; document.getElementById('newGroupForm').classList.remove('show');
  render();
}
function deleteGroup(gid){
  if(D.groups.length<=1){toast('그룹은 최소 1개 필요해요');return;}
  D.groups=D.groups.filter(g=>g.id!==gid); render();
}
function toggleGrassEnabled(gid,val){
  const g=D.groups.find(g=>g.id===gid); if(g) g.grassEnabled=val;
  render(); renderSections();
}

// ══════════════════════════════════════════
// 잔디 탭
// ══════════════════════════════════════════
let currentGrassGid=null;

function goGrass(gid){
  currentGrassGid=gid;
  showTab('grass', document.querySelectorAll('.tab-btn')[1]);
}

function renderGrassTab(){
  const grassGroups=D.groups.filter(g=>g.grassEnabled);
  const sel=document.getElementById('grassSectionSelect');
  sel.innerHTML=grassGroups.map(g=>`
    <button class="grass-sec-btn ${currentGrassGid===g.id?'on':''}"
      onclick="selectGrassGroup('${g.id}')">${g.name}</button>`).join('');
  if(grassGroups.length>0 && !grassGroups.find(g=>g.id===currentGrassGid))
    currentGrassGid=grassGroups[0].id;
  if(currentGrassGid) drawGrass(currentGrassGid);
  else document.getElementById('grassChartWrap').innerHTML=
    '<div class="grass-empty">설정 탭에서 잔디 추적할 섹션을 ON 해주세요</div>';
}

function selectGrassGroup(gid){
  currentGrassGid=gid;
  document.querySelectorAll('.grass-sec-btn').forEach(b=>b.classList.remove('on'));
  event.target.classList.add('on');
  drawGrass(gid);
}

function drawGrass(gid){
  const store=loadGrassStore();
  const today=new Date(); const todayKey=getYYYYMMDD(today);
  const weeks=18; const totalDays=weeks*7;

  // 오늘 실시간 데이터 주입
  if(!store[todayKey]) store[todayKey]={};
  const grp=D.groups.find(g=>g.id===gid);
  if(grp){
    const tot=grp.tasks.length, dn=grp.tasks.filter(t=>t.done).length;
    store[todayKey][gid]={name:grp.name,total:tot,done:dn,pct:tot>0?Math.round(dn/tot*100):0};
  }

  // 셀 배열 생성
  const cells=[];
  for(let i=totalDays-1;i>=0;i--){
    const d=new Date(today); d.setDate(d.getDate()-i);
    const key=getYYYYMMDD(d);
    const gd=store[key]?store[key][gid]:null;
    const pct=gd?gd.pct:null;
    let level=0;
    if(pct!==null){ if(pct>0&&pct<=25)level=1; else if(pct<=50)level=2; else if(pct<=75)level=3; else level=4; }
    cells.push({key,d,level,pct,isToday:key===todayKey});
  }

  // 스트릭
  let streak=0, maxStreak=0, tmp=0;
  for(let i=0;i<totalDays;i++){
    const d=new Date(today); d.setDate(d.getDate()-i);
    const key=getYYYYMMDD(d);
    if(store[key]&&store[key][gid]&&store[key][gid].pct>0) streak++;
    else break;
  }
  cells.forEach(c=>{ if(c.level>0){tmp++;maxStreak=Math.max(maxStreak,tmp);}else tmp=0; });
  const totalDone=cells.filter(c=>c.level>0).length;

  // 월 라벨 (주 단위)
  const monthLabels=[];
  for(let w=0;w<weeks;w++){
    const d=new Date(today); d.setDate(d.getDate()-(weeks-1-w)*7);
    const prev=w>0?(() => {const p=new Date(today);p.setDate(p.getDate()-(weeks-w)*7);return p.getMonth();})():-1;
    monthLabels.push(d.getMonth()!==prev?`${d.getMonth()+1}월`:'');
  }

  const wrap=document.getElementById('grassChartWrap');
  wrap.innerHTML=`
    <div class="grass-wrap">
      <div class="grass-header">
        <span class="grass-title">~/${grp?grp.name:'?'}/ 잔디</span>
        <span class="grass-year">${today.getFullYear()}</span>
      </div>
      <div class="grass-scroll">
        <div class="grass-month-row" id="grassMonthRow"></div>
        <div class="grass-grid" id="grassGrid"></div>
      </div>
      <div class="grass-legend">
        <span class="grass-legend-lbl">Less</span>
        <div class="grass-legend-cells">
          ${['#222','#0a4a14','#0e7321','#18a832','var(--green)'].map(c=>
            `<div class="grass-legend-cell" style="background:${c};border:1px solid #2a2a2a;"></div>`).join('')}
        </div>
        <span class="grass-legend-lbl">More</span>
      </div>
      <div class="grass-stats">
        <div class="grass-stat"><div class="grass-stat-val">${streak}</div><div class="grass-stat-lbl">현재 스트릭</div></div>
        <div class="grass-stat"><div class="grass-stat-val">${maxStreak}</div><div class="grass-stat-lbl">최장 스트릭</div></div>
        <div class="grass-stat"><div class="grass-stat-val">${totalDone}</div><div class="grass-stat-lbl">완료한 날</div></div>
      </div>
    </div>`;

  // 월 라벨 행
  const mRow=document.getElementById('grassMonthRow');
  monthLabels.forEach(lbl=>{
    const d=document.createElement('div');
    d.className='grass-month-lbl';
    d.style.cssText='min-width:99px;';  // 13px*7 + 3px*6 gap ≈ 109px, 조정
    d.style.minWidth=`${13*7+3*6}px`;
    d.textContent=lbl;
    mRow.appendChild(d);
  });

  // 그리드
  const grid=document.getElementById('grassGrid');
  for(let w=0;w<weeks;w++){
    const col=document.createElement('div'); col.className='grass-col';
    for(let dw=0;dw<7;dw++){
      const idx=w*7+dw; if(idx>=cells.length){col.appendChild(document.createElement('div'));continue;}
      const cell=cells[idx];
      const div=document.createElement('div');
      div.className=`grass-cell${cell.level>0?' l'+cell.level:''}${cell.isToday?' today':''}`;
      div.title=`${fmtKey(cell.key)} ${cell.pct!==null?cell.pct+'%':'기록없음'}`;
      col.appendChild(div);
    }
    grid.appendChild(col);
  }
}

// ══════════════════════════════════════════
// 히스토리 탭
// ══════════════════════════════════════════
function renderHistoryTab(){
  const h=loadHistory();
  const keys=Object.keys(h).sort().reverse();
  const cont=document.getElementById('historyList');
  if(keys.length===0){
    cont.innerHTML='<div class="hist-empty">아직 저장된 히스토리가 없어요<br><span style="font-size:10px;color:#444;margin-top:6px;display:block;">설정 탭에서 수동 저장하거나<br>날짜가 바뀌면 자동 저장돼요</span></div>';
    return;
  }
  cont.innerHTML=keys.map(key=>{
    const data=h[key]; const groups=data.groups||[];
    const allTasks=groups.flatMap(g=>g.tasks||[]);
    const doneCount=allTasks.filter(t=>t.done).length, totalCount=allTasks.length;
    let bodyHtml='';
    groups.forEach(g=>{
      const tasks=g.tasks||[]; if(!tasks.length) return;
      bodyHtml+=`<div class="hist-grp-name">~/${g.name}/</div>`;
      [...tasks.filter(t=>t.done),...tasks.filter(t=>!t.done)].forEach(t=>{
        bodyHtml+=`<div class="hist-task ${t.done?'done':''}">${t.name}</div>`;
      });
    });
    return `<div class="hist-day">
      <div class="hist-day-hdr" onclick="toggleHist(this)">
        <span class="hist-day-date"># ${fmtKey(key)}</span>
        <span class="hist-day-badge">✓ ${doneCount}/${totalCount}</span>
      </div>
      <div class="hist-day-body">${bodyHtml||'<span style="color:#3a3a3a;font-size:12px">기록 없음</span>'}</div>
    </div>`;
  }).join('');
}
function toggleHist(hdr){
  hdr.classList.toggle('open');
  hdr.nextElementSibling.classList.toggle('open');
}

// 탭 전환
// ══════════════════════════════════════════
function showTab(name, btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById(`tab-${name}`).classList.add('on');
  if(btn) btn.classList.add('on');
  document.getElementById('bottomBar').style.display = name==='main'?'flex':'none';
  if(name==='grass') renderGrassTab();
  if(name==='history') renderHistoryTab();
  if(name==='settings') renderGrassSettings();
}

// ══════════════════════════════════════════
// 초집중
// ══════════════════════════════════════════
let fGid=null,fTid=null,fSec=25*60,fRunning=false,fInterval=null,fSelMin=25;
function openFocus(gid,tid){
  fGid=gid;fTid=tid;
  document.getElementById('focusTask').textContent=D.groups.find(g=>g.id===gid).tasks.find(t=>t.id===tid).name;
  setTime(25);
  document.getElementById('focusOverlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeFocus(){
  clearInterval(fInterval);fRunning=false;fInterval=null;
  document.getElementById('focusOverlay').classList.remove('show');
  document.body.style.overflow='';
  document.getElementById('focusStartBtn').textContent='▶ START';
}
function setTime(min){
  clearInterval(fInterval);fRunning=false;fInterval=null;
  fSelMin=min;fSec=min*60;updateTimerDisplay();
  document.getElementById('focusStartBtn').textContent='▶ START';
  document.getElementById('focusState').textContent='READY';
  document.querySelectorAll('.f-preset').forEach(b=>b.classList.toggle('on',parseInt(b.dataset.m)===min));
}
function toggleTimer(){
  if(fRunning){
    clearInterval(fInterval);fRunning=false;
    document.getElementById('focusStartBtn').textContent='▶ RESUME';
    document.getElementById('focusState').textContent='PAUSED';
  } else {
    fRunning=true;
    document.getElementById('focusStartBtn').textContent='⏸ PAUSE';
    document.getElementById('focusState').textContent='RUNNING...';
    fInterval=setInterval(()=>{
      fSec--;updateTimerDisplay();
      if(fSec<=0){
        clearInterval(fInterval);fRunning=false;
        document.getElementById('focusState').textContent='✓ DONE!';
        document.getElementById('focusStartBtn').textContent='▶ START';
        toast('⏰ 집중 완료!');
      }
    },1000);
  }
}
function resetTimer(){ setTime(fSelMin); }
function updateTimerDisplay(){
  document.getElementById('focusTimer').textContent=`${pad(Math.floor(fSec/60))}:${pad(fSec%60)}`;
}
function focusDone(){
  if(fGid&&fTid){
    const t=D.groups.find(g=>g.id===fGid).tasks.find(t=>t.id===fTid);
    t.done=true;t.doneAt=getTS(); render();
  }
  closeFocus(); toast('✓ 완료!');
}

// ══════════════════════════════════════════
// 인증 / 리스트
// ══════════════════════════════════════════
function buildCert(){
  const lines=[`#${getMMDD()} #완료한일\n`];
  D.groups.forEach(g=>{
    if(!g.tasks.length) return;
    lines.push(`✅ [${g.name}]`);
    g.tasks.filter(t=>t.done).forEach(t=>lines.push(`- [x] ${t.name}`));
    g.tasks.filter(t=>!t.done).forEach(t=>lines.push(`- [ ] ${t.name}`));
    lines.push('');
  });
  return lines.join('\n');
}
function buildList(){
  const lines=[`#${getMMDD()} #해야할일\n`];
  D.groups.forEach(g=>{
    if(!g.tasks.length) return;
    lines.push(`[${g.name}]`);
    g.tasks.filter(t=>!t.done).forEach(t=>lines.push(`- [ ] ${t.name}`));
    g.tasks.filter(t=>t.done).forEach(t=>lines.push(`- [x] ${t.name}`));
    lines.push('');
  });
  return lines.join('\n');
}
function openCert(){ document.getElementById('certCode').textContent=buildCert(); document.getElementById('certModal').classList.add('show'); }
function openList(){ document.getElementById('listCode').textContent=buildList(); document.getElementById('listModal').classList.add('show'); }
function copyCert(){ navigator.clipboard.writeText(document.getElementById('certCode').textContent).then(()=>toast('📋 복사 완료!')); }
function copyList(){ navigator.clipboard.writeText(document.getElementById('listCode').textContent).then(()=>toast('📋 복사 완료!')); }
function carryover(){ D.groups.forEach(g=>{g.tasks=g.tasks.filter(t=>!t.done);}); render(); modalClose('listModal'); toast('⏩ 미완료 이월!'); }
function modalClose(id,e){
  if(!e || e.target===e.currentTarget || e.target.classList.contains('modal-sec-btn'))
    document.getElementById(id).classList.remove('show');
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// ── 16x16 픽셀 맵 ──

// 크랙은 ' '(빈공간)으로 표현

// ── 캔버스에 그리기 ──
function drawLCD(canvas, stageIdx) {
  if (!canvas) return;
  const rows = FRAMES[Math.min(stageIdx, FRAMES.length - 1)];
  const COLS = rows[0].length;
  const ROWS = rows.length;

  canvas.width  = COLS;
  canvas.height = ROWS;

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = LCD.bg;
  ctx.fillRect(0, 0, COLS, ROWS);

  for (let y = 0; y < ROWS; y++) {
    const row = rows[y] || '';
    for (let x = 0; x < COLS; x++) {
      const ch = row[x] || ' ';
      let color = null;
      if (ch === '#') color = LCD.on;
      else if (ch === '+') color = LCD.dim;
      else if (ch === '.') color = LCD.off;
      else if (ch === '*') color = LCD.hi;
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }
}

// ── 스테이지 계산 ──
function getEggStage(pct) {
  if (pct >= 100) return 5;
  if (pct >= 75)  return 4;
  if (pct >= 50)  return 3;
  if (pct >= 25)  return 2;
  if (pct > 0)    return 1;
  return 0;
}

const EGG_STAGES = [
  { label: '[ EGG_INIT ]',    msg: '오늘의 알이 탄생했어요\n할일을 추가하고 클리어해봐요' },
  { label: '[ CRACK_01  ]',   msg: '첫번째 금이 생겼어요!\n계속 할일을 완료해봐요 💪' },
  { label: '[ CRACK_02  ]',   msg: '금이 더 많이 갔어요!\n안에서 뭔가 꿈틀거리는 것 같아요' },
  { label: '[ BREAKING  ]',   msg: '반이나 깨졌어요!\n조금만 더 힘내요 🔥' },
  { label: '[ HATCHING..]',   msg: '나오려고 해요!!!\n마지막 할일만 끝내봐요 🐣' },
  { label: '[ ★ BORN ★  ]',  msg: '완전히 탄생했어요! 🎉\n오늘 하루 완벽 완료!' },
];

// ── 메인 업데이트 함수 ──
let lastPct = -1;
let hatchShown = false;

function updateEgg(pct) {
  const stage = getEggStage(pct);
  const info  = EGG_STAGES[stage];

  // 진행률 카드 내 알
  drawLCD(document.getElementById('prEggCanvas'), stage);

  // 플로팅 알
  drawLCD(document.getElementById('floatEggCanvas'), stage);

  // 텍스트
  const stageEl = document.getElementById('prEggStage');
  const msgEl   = document.getElementById('prEggMsg');
  if (stageEl) stageEl.textContent = info.label;
  if (msgEl)   msgEl.textContent   = info.msg;

  // 탄생 이벤트
  if (pct === 100 && lastPct !== 100 && !hatchShown) {
    hatchShown = true;
    setTimeout(() => showHatch(), 800);
  }
  lastPct = pct;
}

function openHatchDetail() {
  const all   = D.groups.flatMap(g => g.tasks);
  const total = all.length;
  const done  = all.filter(t => t.done).length;
  showHatch(total > 0 ? Math.round(done / total * 100) : 0);
}

function showHatch(pct) {
  const all   = D.groups.flatMap(g => g.tasks);
  const total = all.length;
  const done  = all.filter(t => t.done).length;
  const realPct = (pct !== undefined) ? pct : (total > 0 ? Math.round(done / total * 100) : 0);
  const stage = getEggStage(realPct);
  const info  = EGG_STAGES[stage];

  drawLCD(document.getElementById('hatchCanvas'), stage);
  document.getElementById('hatchTitle').textContent = info.label;
  document.getElementById('hatchSub').textContent   = `PROGRESS: ${realPct}%\n${info.msg}`;

  if (realPct === 100) launchConfetti();
  document.getElementById('hatchOverlay').classList.add('show');
}

function closeHatch() {
  document.getElementById('hatchOverlay').classList.remove('show');
  document.getElementById('confettiWrap').innerHTML = '';
}

// ── 폭죽 ──
function launchConfetti() {
  const wrap   = document.getElementById('confettiWrap');
  wrap.innerHTML = '';
  const colors = ['#1db833','#5ef07a','#28c840','#febc2e','#fff','#ff5f57'];
  for (let i = 0; i < 70; i++) {
    const el    = document.createElement('div');
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size  = 3 + Math.floor(Math.random() * 5);
    const x     = Math.random() * 100;
    const delay = Math.random() * 0.8;
    const dur   = 1.5 + Math.random() * 1.5;
    el.style.cssText = `position:absolute;left:${x}%;top:-10px;
      width:${size}px;height:${size}px;background:${color};
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      animation:confettiFall ${dur}s ${delay}s ease-in forwards;`;
    wrap.appendChild(el);
  }
}
(function () {
  if (document.getElementById('confettiStyle')) return;
  const s = document.createElement('style');
  s.id = 'confettiStyle';
  s.textContent = `@keyframes confettiFall{
    0%{transform:translateY(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}`;
  document.head.appendChild(s);
})();
